services:
  mosquitto:
    build:
      context: ./docker/mosquitto
      dockerfile: Dockerfile
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: iot-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - iot-network
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:0.6b}
      - OLLAMA_PULL_ON_START=${OLLAMA_PULL_ON_START:-true}
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: iot-app
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./rules:/app/rules
      - ./logs:/app/logs
    networks:
      - iot-network
    ports:
      - "${IOT_STATUS_PORT:-8080}:8080"
      - "${IOT_GRPC_PORT:-50051}:50051"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:0.6b}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - IOT_STATUS_PORT=${IOT_STATUS_PORT:-8080}
      - IOT_AUTO_START=true
    healthcheck:
      test: ["CMD", "python", "docker/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: iot-web
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./rules:/app/rules:ro
    networks:
      - iot-network
    ports:
      - "${WEB_PORT:-8501}:8501"
    environment:
      - IOT_APP_URL=http://app:8080
      - IOT_GRPC_HOST=app
      - IOT_GRPC_PORT=50051
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["streamlit", "run", "src/interfaces/web/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]

  simulator:
    build:
      context: .
      dockerfile: docker/simulator/Dockerfile
    container_name: iot-simulator
    restart: unless-stopped
    profiles:
      - simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - iot-network
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  iot-network:
    driver: bridge
    name: iot-fuzzy-llm-network

volumes:
  mosquitto-data:
    name: iot-mosquitto-data
  mosquitto-logs:
    name: iot-mosquitto-logs
  ollama-models:
    name: iot-ollama-models
